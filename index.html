<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德語字彙測驗</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --correct: #16a34a;
      --correct-bg: #dcfce7;
      --wrong: #dc2626;
      --wrong-bg: #fee2e2;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(0,0,0,.08);
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      text-align: center;
      padding: 32px 16px 28px;
      position: relative;
    }
    header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: .5px; }
    header p { margin-top: 6px; font-size: .95rem; opacity: .85; }

    .container {
      width: 100%;
      max-width: 560px;
      padding: 24px 16px 48px;
    }

    /* ── Mode selector ── */
    .mode-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .mode-btn {
      flex: 1;
      padding: 12px 0;
      border: 2px solid var(--primary);
      border-radius: var(--radius);
      background: transparent;
      color: var(--primary);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .mode-btn.active,
    .mode-btn:hover {
      background: var(--primary);
      color: #fff;
    }

    /* ── Progress ── */
    .progress-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      font-size: .9rem;
      color: var(--text-secondary);
    }
    .progress-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin: 0 14px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width .4s ease;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 28px 28px;
      text-align: center;
    }
    .card-label {
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .card-word {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 28px;
      line-height: 1.3;
      word-break: break-word;
    }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
      color: var(--text);
    }
    .option-btn:hover:not(.disabled) {
      border-color: var(--primary);
      background: #eef2ff;
    }
    .option-btn.correct {
      border-color: var(--correct);
      background: var(--correct-bg);
      font-weight: 600;
    }
    .option-btn.wrong {
      border-color: var(--wrong);
      background: var(--wrong-bg);
    }
    .option-btn.disabled { cursor: default; opacity: .7; }
    .option-btn.disabled.correct { opacity: 1; }

    .option-pair {
      font-size: .8rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Typing area ── */
    .typing-area {
      margin-top: 20px;
      display: none;
      text-align: center;
    }
    .typing-area.show { display: block; }
    .typing-label {
      font-size: .9rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .typing-row {
      display: flex;
      gap: 8px;
    }
    .typing-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 1.1rem;
      outline: none;
      transition: border-color .2s;
    }
    .typing-input:focus { border-color: var(--primary); }
    .typing-input.input-correct { border-color: var(--correct); background: var(--correct-bg); }
    .typing-input.input-wrong { border-color: var(--wrong); background: var(--wrong-bg); }
    .typing-submit {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    .typing-submit:hover { background: var(--primary-hover); }
    .typing-submit:disabled { opacity: .5; cursor: default; }
    .typing-feedback {
      margin-top: 8px;
      font-size: .9rem;
      font-weight: 600;
      min-height: 1.4em;
    }
    .typing-feedback.fb-correct { color: var(--correct); }
    .typing-feedback.fb-wrong { color: var(--wrong); }

    .score-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 700;
    }
    .score-badge.full { background: var(--correct-bg); color: var(--correct); }
    .score-badge.half { background: #fef9c3; color: #a16207; }
    .score-badge.zero { background: var(--wrong-bg); color: var(--wrong); }

    /* ── Next button ── */
    .next-btn {
      margin-top: 22px;
      padding: 13px 0;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: background .2s;
    }
    .next-btn:hover { background: var(--primary-hover); }
    .next-btn.show { display: block; }

    /* ── Result ── */
    .result {
      text-align: center;
      padding: 48px 20px;
    }
    .result-icon { font-size: 4rem; margin-bottom: 16px; }
    .result h2 { font-size: 1.6rem; margin-bottom: 8px; }
    .result .score { font-size: 3rem; font-weight: 800; color: var(--primary); margin: 12px 0; }
    .result p { color: var(--text-secondary); margin-bottom: 28px; }
    .restart-btn {
      padding: 14px 48px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .restart-btn:hover { background: var(--primary-hover); }

    /* ── Settings row ── */
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: .9rem;
      color: var(--text-secondary);
    }
    .settings-row label { font-weight: 500; }
    .settings-row select {
      padding: 6px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: .9rem;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      header { padding: 24px 12px 20px; }
      header h1 { font-size: 1.35rem; }
      .card { padding: 28px 18px 22px; }
      .card-word { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>德語字彙測驗</h1>
  <p>中翻德 ／ 德翻中 選擇題練習</p>
</header>

<div class="container">
  <!-- Mode -->
  <div class="mode-bar">
    <button class="mode-btn active" data-mode="zh2de">中文 → 德文</button>
    <button class="mode-btn" data-mode="de2zh">德文 → 中文</button>
  </div>

  <!-- Settings -->
  <div class="settings-row">
    <label for="qcount">題數：</label>
    <select id="qcount">
      <option value="10">10 題</option>
      <option value="20" selected>20 題</option>
      <option value="30">30 題</option>
      <option value="50">50 題</option>
      <option value="0">全部</option>
    </select>
  </div>

  <!-- Progress -->
  <div class="progress-area" id="progressArea">
    <span id="progressText">1 / 20</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span id="scoreText">0 分</span>
  </div>

  <!-- Quiz card -->
  <div id="quizCard" class="card">
    <div class="card-label" id="cardLabel">請選出正確的德文</div>
    <div class="card-word" id="cardWord">—</div>
    <div class="options" id="optionsEl"></div>
    <div class="typing-area" id="typingArea">
      <div class="typing-label" id="typingLabel">請輸入正確的德文單字：</div>
      <div class="typing-row">
        <input type="text" class="typing-input" id="typingInput" autocomplete="off" spellcheck="false">
        <button class="typing-submit" id="typingSubmit">確認</button>
      </div>
      <div class="typing-feedback" id="typingFeedback"></div>
    </div>
    <button class="next-btn" id="nextBtn">下一題</button>
  </div>

  <!-- Result -->
  <div id="resultEl" class="card result" style="display:none;">
    <div class="result-icon">🎉</div>
    <h2>測驗完成！</h2>
    <div class="score" id="finalScore">0%</div>
    <p id="finalDetail"></p>
    <button class="restart-btn" id="restartBtn">再來一次</button>
  </div>
</div>

let mode = "zh2de";
let totalQ = 20;
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let typingPhase = false;  // true = waiting for user to type German
let typingDone = false;   // true = typing already submitted

const $ = id => document.getElementById(id);

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildQuestions() {
  const pool = shuffle([...VOCAB]);
  const count = totalQ === 0 ? pool.length : Math.min(totalQ, pool.length);
  questions = pool.slice(0, count);
  current = 0;
  score = 0;
  answered = false;
  typingPhase = false;
  typingDone = false;
}

function pickDistractors(correctIdx) {
  const others = VOCAB.filter((_, i) => i !== correctIdx);
  shuffle(others);
  return others.slice(0, 3);
}

function formatScore(s) {
  return Number.isInteger(s) ? s : s.toFixed(1);
}

function render() {
  $("resultEl").style.display = "none";
  $("quizCard").style.display = "";
  $("progressArea").style.display = "";

  const total = questions.length;
  $("progressText").textContent = `${current + 1} / ${total}`;
  $("progressFill").style.width = `${((current) / total) * 100}%`;
  $("scoreText").textContent = `${formatScore(score)} / ${total * 1}`;

  const [de, zh] = questions[current];
  const correctVocabIdx = VOCAB.findIndex(v => v[0] === de && v[1] === zh);

  if (mode === "zh2de") {
    $("cardLabel").textContent = "請選出正確的德文";
    $("cardWord").textContent = zh;
  } else {
    $("cardLabel").textContent = "請選出正確的中文";
    $("cardWord").textContent = de;
  }

  const distractors = pickDistractors(correctVocabIdx);
  const optionData = shuffle([questions[current], ...distractors]);

  const optionsEl = $("optionsEl");
  optionsEl.innerHTML = "";
  optionData.forEach(([ode, ozh]) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = mode === "zh2de" ? ode : ozh;
    btn.dataset.de = ode;
    btn.dataset.zh = ozh;
    btn.addEventListener("click", () => handleAnswer(btn, de, zh));
    optionsEl.appendChild(btn);
  });

  $("nextBtn").classList.remove("show");
  $("typingArea").classList.remove("show");
  $("typingInput").value = "";
  $("typingInput").className = "typing-input";
  $("typingFeedback").textContent = "";
  $("typingFeedback").className = "typing-feedback";
  $("typingSubmit").disabled = false;
  answered = false;
  typingPhase = false;
  typingDone = false;
}

function revealAllPairs() {
  const allBtns = $("optionsEl").querySelectorAll(".option-btn");
  allBtns.forEach(b => {
    const pair = document.createElement("div");
    pair.className = "option-pair";
    pair.textContent = `${b.dataset.de}  =  ${b.dataset.zh}`;
    b.appendChild(pair);
  });
}

function handleAnswer(btn, correctDe, correctZh) {
  if (answered) return;
  answered = true;

  const isCorrect = btn.dataset.de === correctDe && btn.dataset.zh === correctZh;

  const allBtns = $("optionsEl").querySelectorAll(".option-btn");
  allBtns.forEach(b => {
    b.classList.add("disabled");
    if (b.dataset.de === correctDe && b.dataset.zh === correctZh) {
      b.classList.add("correct");
    }
  });

  if (isCorrect) {
    // Phase 1 done: MC correct → reveal all pairs + show typing input
    revealAllPairs();
    score += 0.5;
    $("scoreText").textContent = `${formatScore(score)} / ${questions.length}`;
    typingPhase = true;

    $("typingArea").classList.add("show");
    $("typingLabel").textContent = `請輸入正確的德文單字：`;
    setTimeout(() => $("typingInput").focus(), 50);
  } else {
    // Wrong answer: show correct, reveal pairs, 0 points
    btn.classList.add("wrong");
    revealAllPairs();
    showNextOrResult();
  }
}

function handleTypingSubmit() {
  if (!typingPhase || typingDone) return;
  typingDone = true;

  const [correctDe] = questions[current];
  const userInput = $("typingInput").value.trim();
  const isMatch = userInput === correctDe;

  $("typingSubmit").disabled = true;

  if (isMatch) {
    $("typingInput").classList.add("input-correct");
    $("typingFeedback").textContent = "正確！獲得完整 1 分";
    $("typingFeedback").classList.add("fb-correct");
    score += 0.5;
  } else {
    $("typingInput").classList.add("input-wrong");
    $("typingFeedback").innerHTML = `正確答案：<strong>${correctDe}</strong>（獲得 0.5 分）`;
    $("typingFeedback").classList.add("fb-wrong");
  }

  $("scoreText").textContent = `${formatScore(score)} / ${questions.length}`;
  typingPhase = false;
  showNextOrResult();
}

function showNextOrResult() {
  if (current < questions.length - 1) {
    $("nextBtn").classList.add("show");
  } else {
    setTimeout(showResult, 800);
  }
}

function showResult() {
  $("quizCard").style.display = "none";
  $("progressArea").style.display = "none";
  $("resultEl").style.display = "";
  const maxScore = questions.length;
  const pct = Math.round((score / maxScore) * 100);
  $("finalScore").textContent = `${pct}%`;
  $("finalDetail").textContent = `共 ${questions.length} 題，得到 ${formatScore(score)} / ${maxScore} 分`;
  $("progressFill").style.width = "100%";
}

function start() {
  buildQuestions();
  render();
}

/* ── Event listeners ── */

document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
    start();
  });
});

$("qcount").addEventListener("change", e => {
  totalQ = parseInt(e.target.value, 10);
  start();
});

$("nextBtn").addEventListener("click", () => {
  current++;
  render();
});

$("restartBtn").addEventListener("click", start);

$("typingSubmit").addEventListener("click", handleTypingSubmit);
$("typingInput").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); handleTypingSubmit(); }
});

/* ── Keyboard shortcut ── */
document.addEventListener("keydown", e => {
  // If typing input is focused, don't trigger number shortcuts
  if (document.activeElement === $("typingInput")) return;

  if (e.key === "Enter" && typingPhase && !typingDone) {
    handleTypingSubmit();
    return;
  }
  if (e.key === "Enter" && answered && !typingPhase && current < questions.length - 1) {
    current++;
    render();
    return;
  }
  const num = parseInt(e.key, 10);
  if (num >= 1 && num <= 4 && !answered) {
    const btns = $("optionsEl").querySelectorAll(".option-btn");
    if (btns[num - 1]) btns[num - 1].click();
  }
});

start();
</script>
</body>
</html>
